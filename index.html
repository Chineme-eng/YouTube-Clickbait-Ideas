const grid = document.getElementById('grid');
const statsEl = document.getElementById('stats-count');
const searchEl = document.getElementById('search');
const sortEl = document.getElementById('sort');
const filterBtns = document.querySelectorAll('.filter-btn');

let activeCat = 'all';
let searchTerm = '';
let sortMode = 'default';

function render() {
  let list = [...ideas];

  if (activeCat === 'viral') {
    list = list.filter(i => i.viral);
  } else if (activeCat !== 'all') {
    list = list.filter(i => i.cat === activeCat);
  }

  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(i =>
      i.title.toLowerCase().includes(q) ||
      i.desc.toLowerCase().includes(q) ||
      i.tool.toLowerCase().includes(q) ||
      i.cat.toLowerCase().includes(q)
    );
  }

  if (sortMode === 'az') {
    list.sort((a, b) => a.title.localeCompare(b.title));
  } else if (sortMode === 'cat') {
    list.sort((a, b) => a.cat.localeCompare(b.cat) || ideas.indexOf(a) - ideas.indexOf(b));
  }

  const count = list.length;
  statsEl.innerHTML = `Showing <strong>${count}</strong> idea${count !== 1 ? 's' : ''}`;

  if (count === 0) {
    grid.innerHTML = '<div class="empty"><p>Nothing found</p><p>Try a different search or filter.</p></div>';
    return;
  }

  grid.innerHTML = list.map((idea) => {
    const origNum = ideas.indexOf(idea) + 1;
    return `
      <div class="card">
        <div class="card-top">
          <span class="card-num">${origNum}</span>
          <span class="card-title">${idea.title}</span>
        </div>
        <p class="card-desc">${idea.desc}</p>
        <div class="card-footer">
          <span class="badge badge-cat-${idea.cat}">${idea.cat}</span>
          <span class="badge badge-tool">${idea.tool}</span>
          ${idea.viral ? '<span class="badge badge-viral">🔥 Viral</span>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    render();
  });
});

searchEl.addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

sortEl.addEventListener('change', e => {
  sortMode = e.target.value;
  render();
});

render();
</script>
